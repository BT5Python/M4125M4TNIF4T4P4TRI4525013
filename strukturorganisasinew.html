<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>evolution is my REVOLUTION</title>

<style>
body {
  background-color: black;
  color: #00ff00;
  font-family: "Courier New", monospace;
  padding: 20px;
  font-size: 12px;
  text-align: left;
  overflow-x: hidden;
}

pre {
  white-space: pre-wrap;
  word-wrap: break-word;
  letter-spacing: 1px;
  line-height: 1.5;
  transform: scale(0.9);
  transform-origin: top left;
}

/* Cursor blinking */
.typing {
  border-right: 2px solid #00ff00;
  animation: blinkCursor 0.7s infinite;
}
@keyframes blinkCursor { 50% { border-color: transparent; } }

/* Blink merah */
.blink-red {
  color: #ff0000;
  animation: blinkRed 0.45s infinite;
}
@keyframes blinkRed {
  0%, 100% { color: #ff0000; }
  50% { color: #330000; }
}

/* PRIORITAS — teks kuning berkedip (menonjol) */
.blink-prioritas {
  color: #ffff00;
  font-weight: bold;
  animation: blinkPrior 0.6s infinite;
}
@keyframes blinkPrior {
  0%   { color: #ffff00; text-shadow: 0 0 6px #ffff00; }
  50%  { color: #333300; text-shadow: none; }
  100% { color: #ffff00; text-shadow: 0 0 6px #ffff00; }
}

/* PNS kuning (tanpa animasi) */
.yellow {
  color: #00ff00;
  font-weight: bold;
}

.hidden { display: none; }

/* Tombol bawah */
.button-container {
  text-align: center;
  margin-top: 20px;
}
button {
  background-color: black;
  color: #00ff00;
  border: 1px solid #00ff00;
  padding: 8px 20px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 8px;
  margin: 0 10px;
  transition: 0.3s;
  font-family: "Courier New", monospace;
}
button:hover {
  background-color: #00ff00;
  color: black;
}

/* Tombol download merah */
button.download-btn {
  color: #ff0000;
  border-color: #ff0000;
  animation: blinkRed 0.5s infinite;
}
button.download-btn:hover {
  background-color: #ff0000;
  color: black;
  animation: none;
}

/* Running text */
#runningText {
  color: #00ff00;
  white-space: nowrap;
  overflow: hidden;
  font-weight: bold;
  margin-bottom: 10px;
}
#runningText span {
  display: inline-block;
  padding-left: 100%;
  animation: runText 15s linear infinite;
}
@keyframes runText {
  from { transform: translateX(0); }
  to { transform: translateX(-100%); }
}

/* RESPONSIVE SUPAYA MUAT 1 BARIS */
pre {
  white-space: pre !important;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden !important;
}

#terminal { font-size: 10px !important; }

@media (max-width: 1100px) { #terminal { font-size: 8px !important; } }
@media (max-width: 800px)  { #terminal { font-size: 7px !important; } }
@media (max-width: 600px)  { #terminal { font-size: 6px !important; } }
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <p>>> initializing connection...</p>
  <p class="hidden">>>> accessing database node...</p>
  <p class="hidden">>>> verifying security clearance...</p>
  <p class="hidden">>>> clearance level verified ✓</p>
  <p class="hidden">>>> retrieving jabatan kosong...</p>
</div>

<!-- MAIN -->
<div id="main" class="hidden">
  <div id="runningText">
    <span>⚠ DATA INI BERSIFAT RAHASIA - HANYA UNTUK LINGKUNGAN PUSLAT KODIKLATAU ⚠ </span>
  </div>
  <pre id="terminal" class="typing"></pre>
</div>

<!-- TOMBOL -->
<div class="button-container hidden" id="buttons">  
  <button onclick="window.location.href='database.html'">back to DATABASE</button>
  <button class="download-btn" onclick="downloadFile()">⬇ DOWNLOAD</button>
</div>
<script>
// Fullscreen untuk Android WebView / PWA
function forceFullscreen() {
  const elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen().catch(()=>{});
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  }
}

// Deteksi jika dijalankan sebagai PWA atau WebView
function isStandalone() {
  return (window.matchMedia('(display-mode: standalone)').matches || 
          window.navigator.standalone === true);
}

// Jika PWA → langsung fullscreen
if (isStandalone()) {
  setTimeout(forceFullscreen, 500);
}

// Jika Android WebView → auto fullscreen
if (navigator.userAgent.includes("wv") || navigator.userAgent.includes("Android")) {
  setTimeout(forceFullscreen, 800);
}

// Browser biasa tetap butuh klik pertama
document.addEventListener("click", function() {
  forceFullscreen();
}, { once: true });
</script>

</body>
</html>
