<!DOCTYPE html>
<html>
<head>
<style>
.box {
  width: 220px;
  border: 1px solid black;
  font-family: Arial;
  text-align: center;
}

/* tiap baris */
.row {
  padding: 6px;
}

/* garis pemisah */
.row:not(:last-child) {
  border-bottom: 1px solid black;
}

/* styling teks */
.judul {
  background: #2da8d8;
  color: white;
  font-weight: bold;
  font-size: 12px;
}

.nama {
  font-weight: bold;
}

.jabatan {
  font-size: 12px;
}
</style>
</head>

<body>

<div class="box">

  <div class="row judul">KOMANDAN</div>

  <div class="row nama">
    Erwan Andrian, S.E., M.M
  </div>

  <div class="row jabatan">
    Marsekal Pertama TNI
  </div>

</div>

</body>
</html>
