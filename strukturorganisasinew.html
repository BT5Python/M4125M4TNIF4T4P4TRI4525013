<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: Arial;
  text-align: center;
}

/* container sejajar */
.wrapper {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 50px;
}

/* kotak */
.box {
  width: 180px;
  border: 1px solid black;
}

/* baris */
.row {
  padding: 8px;
}

/* garis pemisah */
.row:not(:last-child) {
  border-bottom: 1px solid black;
}

/* style */
.judul {
  background: #2da8d8;
  color: white;
  font-weight: bold;
  font-size: 12px;
}

.nama {
  font-weight: bold;
}

.jabatan {
  font-size: 12px;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- KOTAK 1 -->
  <div class="box">
    <div class="row judul">KOMANDAN PUSLAT</div>
    <div class="row nama">ERWAN ANDRIAN, S.E., M.M</div>
    <div class="row jabatan">Marsekal Pertama TNI</div>
  </div>

  <!-- KOTAK 2 -->
  <div class="box">
    <div class="row judul">KOTAK 2</div>
    <div class="row nama">Nama 2</div>
    <div class="row jabatan">Jabatan 2</div>
  </div>

  <!-- KOTAK 3 -->
  <div class="box">
    <div class="row judul">KOTAK 3</div>
    <div class="row nama">Nama 3</div>
    <div class="row jabatan">Jabatan 3</div>
  </div>

  <!-- KOTAK 4 -->
  <div class="box">
    <div class="row judul">KOTAK 4</div>
    <div class="row nama">Nama 4</div>
    <div class="row jabatan">Jabatan 4</div>
  </div>

</div>

</body>
</html>
